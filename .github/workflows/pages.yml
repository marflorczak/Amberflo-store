name: Publikacja sklepu Amberflo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz pliki
        uses: actions/checkout@v6
      - name: Przygotuj GitHub Pages
        uses: actions/configure-pages@v5
      - name: Spakuj stronę
        uses: actions/upload-pages-artifact@v4
        with:
          path: .
      - name: Opublikuj stronę
        id: deployment
        uses: actions/deploy-pages@v4

